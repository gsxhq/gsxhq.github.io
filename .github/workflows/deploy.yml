name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v5
      - name: Checkout gsx (docs source)
        uses: actions/checkout@v5
        with:
          repository: gsxhq/gsx
          path: _gsx
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build playground WASM (client-side transform + format)
        run: |
          cd _gsx
          GOOS=js GOARCH=wasm go build -o "$GITHUB_WORKSPACE/public/gsx.wasm" ./playground/wasm
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" "$GITHUB_WORKSPACE/public/wasm_exec.js"
          ls -la "$GITHUB_WORKSPACE/public/gsx.wasm"
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci
      - name: Build with VitePress
        run: npm run build
        env:
          GSX_DOCS_SRC: ${{ github.workspace }}/_gsx
          VITE_GSX_PLAYGROUND_API: ${{ vars.GSX_PLAYGROUND_API }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
